# =============================================================================
# Llama-family kernel configuration
# =============================================================================
# Covers: Llama-2 (7B/13B/70B), Llama-3 (8B/70B), Llama-3.1, CodeLlama
#
# Model properties:
#   - head_size: 128
#   - GQA ratio: 8 (70B) or 1 (7B/8B/13B, treated as MHA → qgroup=8)
#   - page_size: typically 16 or 64 in vLLM (depends on deployment config)
#   - causal: true (autoregressive)
#   - local: false (no sliding window in base Llama)
#   - sink: false (no StreamingLLM)
#
# Format: qgroup,headsize,pagesize,causal,local,sink
#   If causal/local/sink omitted, all 8 bool combinations are generated.
#   Specify them explicitly to minimize kernel count.
#
# This config generates: 3 pagesize × 2 variants = 6 kernels
# (vs 384 for full config → ~98% reduction)

# Standard Llama decode (causal=true, no sliding window, no sink)
8,128,16,true,false,false
8,128,64,true,false,false
8,128,32,true,false,false

# Llama-3.1 long context with sliding window (local=true)
# Uncomment if you use sliding window attention:
# 8,128,16,true,true,false
# 8,128,64,true,true,false

# StreamingLLM sink attention (rare, uncomment if needed):
# 8,128,16,true,true,true
# 8,128,64,true,true,true

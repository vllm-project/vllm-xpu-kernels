# =============================================================================
# DeepSeek-family chunk prefill kernel configuration
# =============================================================================
# Covers: DeepSeek-V2, DeepSeek-V3, DeepSeek-R1
#
# Model properties:
#   - head_size: 128 (standard) + 192 (MLA latent heads)
#   - causal: true
#   - local: false
#   - sink: false
#
# Format: headsize,paged,causal,local,sink,lse
#
# This config generates: 6 kernels (vs 216 full → ~97% reduction)

# Standard heads (head_size=128)
128,true,true,false,false,false
128,false,true,false,false,false
128,false,true,false,false,true

# MLA latent heads (head_size=192)
192,true,true,false,false,false
192,false,true,false,false,false
192,false,true,false,false,true

# =============================================================================
# Llama-family kernel configuration
# =============================================================================
# Covers: Llama-2 (7B/13B/70B), Llama-3 (8B/70B), Llama-3.1, CodeLlama
#
# Model properties:
#   - head_size: 128
#   - GQA ratio: 8 (70B) or 1 (7B/8B/13B, treated as MHA → qgroup=8)
#   - page_size: typically 16 or 64 in vLLM (depends on deployment config)
#   - causal: true (autoregressive)
#   - local: false (no sliding window in base Llama)
#   - sink: false (no StreamingLLM)
#
# For Llama models with sliding window (Llama-3.1 long context):
#   - local: true, sink: possibly true
#
# This config generates: 2 pagesize × 1 headsize × 1 qgroup × 8 bools = 16 kernels
# (vs 384 for full config → ~96% reduction)

# Standard decode: page_size 16 (common vLLM default)
8,128,16

# Standard decode: page_size 64 (larger page)
8,128,64

# If using page_size 32
8,128,32

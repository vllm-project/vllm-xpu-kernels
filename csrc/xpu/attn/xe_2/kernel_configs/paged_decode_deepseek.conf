# =============================================================================
# DeepSeek-family kernel configuration
# =============================================================================
# Covers: DeepSeek-V2, DeepSeek-V3, DeepSeek-R1
#
# Model properties:
#   - head_size: 128 (standard heads) + 192 (latent attention heads in MLA)
#   - GQA ratio: varies; DeepSeek-V2 uses MLA with effective ratio mapped to 8
#   - page_size: 16 or 64
#   - causal: true
#   - local: false
#   - sink: false
#
# Format: qgroup,headsize,pagesize,causal,local,sink
#
# This config generates: 6 kernels (vs 384 full → ~98% reduction)

# Standard heads (head_size=128, causal only)
8,128,16,true,false,false
8,128,64,true,false,false
8,128,32,true,false,false

# MLA latent heads (head_size=192, causal only)
8,192,16,true,false,false
8,192,64,true,false,false
8,192,32,true,false,false

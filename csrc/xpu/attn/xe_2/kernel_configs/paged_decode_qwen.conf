# =============================================================================
# Qwen-family kernel configuration
# =============================================================================
# Covers: Qwen2 (7B/72B), Qwen2.5, Qwen3 (30B/235B MoE)
#
# Model properties:
#   - head_size: 128
#   - GQA ratio: 4 (Qwen2-7B) or 8 (Qwen2-72B, Qwen3-30B)
#   - page_size: 16 or 64 in vLLM
#   - causal: true
#   - local: false (Qwen2 base), true (Qwen2.5 with sliding window)
#   - sink: false
#
# Format: qgroup,headsize,pagesize,causal,local,sink
#
# This config generates: 6 kernels (vs 384 full → ~98% reduction)

# Qwen2/Qwen3 standard decode (causal, no sliding window)
8,128,16,true,false,false
8,128,64,true,false,false
8,128,32,true,false,false

# Qwen2.5 with sliding window (local=true)
# Uncomment if your model uses sliding window attention:
# 8,128,16,true,true,false
# 8,128,64,true,true,false
# 8,128,32,true,true,false

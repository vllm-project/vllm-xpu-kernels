# =============================================================================
# Common chunk prefill kernel configuration
# =============================================================================
# Covers most popular models (Llama, Qwen, Mistral, DeepSeek, Gemma)
# without building everything.
#
# Format: headsize,paged,causal,local,sink,lse
#
# This generates: ~12 kernels (vs 216 full → ~94% reduction)

# head_size=128 (Llama, Qwen, Mistral, DeepSeek standard heads)
# Paged causal decode (most common serving scenario)
128,true,true,false,false,false
# Non-paged causal (prompt processing without paged cache)
128,false,true,false,false,false
# Non-paged causal with LSE (for chunked prefill merge)
128,false,true,false,false,true

# head_size=192 (DeepSeek MLA latent heads)
192,true,true,false,false,false
192,false,true,false,false,false

# head_size=256 (Gemma-2)
256,true,true,false,false,false
256,false,true,false,false,false

# Sliding window support (uncomment if needed):
# 128,true,true,true,false,false
# 128,false,true,true,false,false

# =============================================================================
# Common kernel configuration (covers most popular models)
# =============================================================================
# A reasonable default that covers Llama, Qwen, Mistral, DeepSeek, Gemma
# without building everything.
#
# Format: qgroup,headsize,pagesize[,causal,local,sink]
#   - If causal/local/sink omitted → all 8 bool combos generated
#   - If specified → only that exact combination is generated
#
# This generates: ~20 kernels (vs 384 full → ~95% reduction)

# head_size=128, qgroup=8 (Llama-70B, Qwen-72B, Qwen3-30B, Mistral-7B)
# Most models only use causal=true, no sliding window, no sink
8,128,16,true,false,false
8,128,32,true,false,false
8,128,64,true,false,false

# head_size=128, qgroup=16 (models with large GQA ratio)
16,128,16,true,false,false
16,128,32,true,false,false
16,128,64,true,false,false

# head_size=192 (DeepSeek MLA)
8,192,16,true,false,false
8,192,64,true,false,false

# head_size=256 (Gemma-2, some custom models)
8,256,16,true,false,false
8,256,64,true,false,false

# Sliding window support (Mistral, Qwen2.5, Llama-3.1 long context)
# Uncomment if you need local attention:
# 8,128,16,true,true,false
# 8,128,64,true,true,false

# Full bool combos for a specific policy (uncomment if unsure):
# 8,128,16

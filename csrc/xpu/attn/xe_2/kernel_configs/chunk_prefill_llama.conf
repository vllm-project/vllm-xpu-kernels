# =============================================================================
# Llama-family chunk prefill kernel configuration
# =============================================================================
# Covers: Llama-2, Llama-3, Llama-3.1, CodeLlama
#
# Model properties:
#   - head_size: 128
#   - causal: true (autoregressive)
#   - local: false (no sliding window in base Llama)
#   - sink: false
#
# Format: headsize,paged,causal,local,sink,lse
#
# This config generates: 3 kernels (vs 216 full → ~99% reduction)

# Paged causal (chunked prefill with paged KV cache)
128,true,true,false,false,false

# Non-paged causal (initial prompt, no page table)
128,false,true,false,false,false

# Non-paged causal with LSE output (for chunked prefill state merging)
128,false,true,false,false,true

# Llama-3.1 sliding window (uncomment if needed):
# 128,true,true,true,false,false
# 128,false,true,true,false,false
